# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: 2026-04-23

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: pierce_damage_falloff
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    variables:
      - base_damage
      - pierce_falloff
      - n
    output_range: [1, base_damage]
    expression: "damage(n) = max(1, floor(base_damage * (1 - pierce_falloff)^n))"
    notes: "n is 0-indexed contact count within a single arc. Output clamped to minimum 1 (never zero — every hit produces visible feedback). Expected to be referenced_by G4 (mod stat delta source), G5 (asteroid damage intake), G6 (enemy damage intake), G8 (boss damage intake) when those GDDs are authored."
    added: 2026-04-23
    revised: ""

  - name: camera_shake_intensity
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    variables:
      - damage_dealt
      - base_damage
      - base_shake_intensity
      - max_shake_intensity
      - detonate_shake_multiplier
    output_range: [0.0, max_shake_intensity]
    expression: "pierce variant: clamp(base_shake_intensity * (1 + log2(damage_dealt / base_damage)), 0.0, max_shake_intensity); detonate variant: clamp((base_shake_intensity * detonate_shake_multiplier) * (1 + log2(damage_dealt / base_damage)), 0.0, max_shake_intensity)"
    notes: "Two variants: pierce-hit scaling and detonate-on-return scaling. Log-scaled to prevent absurd shake at tier-10+ damage. Output consumed by G2 via ICameraShakeRequester.Request. Expected to be referenced_by design/gdd/g2-camera-system.md when authored."
    added: 2026-04-23
    revised: ""

# Example:
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD scales attack variable
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "Output feeds into health-system damage intake. Min is 0 (armour
#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: boomerang_base_damage_starting
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 1
    unit: damage (integer tier)
    notes: "First-run base damage tier per Pillar 1 integer-tier discipline. Expected to be referenced_by C6 (hosts the stat in GameStatsContext), P1a (tree nodes modify via IUpgradeSource), G4 (mods modify via IUpgradeSource) when authored."
    added: 2026-04-23
    revised: ""

  - name: boomerang_throw_cooldown_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0.8
    unit: seconds
    notes: "Default seed value for F5 cooldown timer. Safe range 0.3–5.0 s. Crosses G3 → C6 → P1a/G4."
    added: 2026-04-23
    revised: ""

  - name: boomerang_arc_radius_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 5.0
    unit: world_units (peak deviation)
    notes: "Peak deviation interpretation — what you set is player-visible max lateral offset. P1 Bezier control point uses 2 × arc_radius. Safe range 0.0–20.0 wu."
    added: 2026-04-23
    revised: ""

  - name: boomerang_arc_flight_time_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0.8
    unit: seconds
    notes: "Outbound leg duration (same value used for inbound). Safe range 0.1–5.0 s; 0.1 s is hard safety floor (EC-5)."
    added: 2026-04-23
    revised: ""

  - name: boomerang_pierce_falloff_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0.35
    unit: ratio (0.0–1.0)
    notes: "Feeds F3 pierce_damage_falloff formula. At base_damage=5 produces sequence [5,3,2,1,1]. Safe range 0.0–1.0; 0.0 = no falloff, 1.0 = only first hit does damage."
    added: 2026-04-23
    revised: ""

  - name: boomerang_chain_count_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0
    unit: count
    notes: "Chain archetype locked at 0 until tree node purchased. MVP maximum is 1 (chain does not cascade per CR-7). Post-MVP values > 1 are undefined — flagged as OQ-CHAIN-SCALING."
    added: 2026-04-23
    revised: ""

  - name: boomerang_return_detonate_radius_default
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0.0
    unit: world_units
    notes: "Detonate-on-return archetype locked at 0 until tree node purchased. Post-unlock MVP default 3.0 wu. Safe range 0.0–10.0 wu."
    added: 2026-04-23
    revised: ""

  - name: boomerang_min_arc_flight_time_safety
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 0.1
    unit: seconds
    notes: "Hard safety floor. EC-5 requires this clamp before F1/F2 Bezier evaluation to prevent division-by-zero. Not tunable as a design knob — if design needs shorter arcs, fix the interpolation math first. C6 validation should enforce this floor at stat-delta application time."
    added: 2026-04-23
    revised: ""

  - name: boomerang_target_registry_capacity
    status: active
    source: design/gdd/g3-boomerang-weapon.md
    referenced_by:
      - design/gdd/g3-boomerang-weapon.md
    value: 64
    unit: entity slots (List<T> capacity)
    notes: "TargetRegistry pre-allocation. Covers 50-entity peak density from CR-11 with headroom. Affects G5/G6/G8 Register() call timing — spawn systems must not exceed this capacity or risk allocation spike. Safe range 32–256."
    added: 2026-04-23
    revised: ""

